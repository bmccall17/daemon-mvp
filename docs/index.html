<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daemon - Social Signaling Through Spatial AI Companions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #state-selector {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: all;
      z-index: 20;
    }
    #state-selector button {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: rgba(10,10,15,0.8);
      color: #ccc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    #state-selector button:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }
    #state-selector button.active {
      border-color: currentColor;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    #topic-selector {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      max-width: 500px;
      pointer-events: all;
      z-index: 20;
    }
    #topic-selector.visible { display: flex; }
    #topic-selector button {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      background: rgba(10,10,15,0.7);
      color: #999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    #topic-selector button:hover { color: #ccc; }
    #topic-selector button.active {
      border-color: currentColor;
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      pointer-events: none;
      z-index: 20;
      text-align: center;
      transition: opacity 2s;
    }
    #peer-count {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.4);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      z-index: 20;
    }
  </style>
  <script type="module" crossorigin src="/daemon-mvp/assets/index-DlNNuZhG.js"></script>
</head>
<body>
  <div id="ui-overlay"></div>
  <div id="instructions">WASD to move / Click and drag to look / Select your social state below</div>
  <div id="peer-count"></div>
  <div id="topic-selector"></div>
  <div id="state-selector"></div>
  <!-- MVMF vendor libs (must load in order before ManifolderClient) -->
  <script src="vendor/mv/jquery-3.3.1.js"></script>
  <script src="vendor/mv/socket.io.min.js"></script>
  <script src="vendor/mv/MVMF.js"></script>
  <script src="vendor/mv/MVSB.js"></script>
  <script src="vendor/mv/MVXP.js"></script>
  <script src="vendor/mv/MVIO.js"></script>
  <script src="vendor/mv/MVRP.js"></script>
  <script src="vendor/mv/MVRest.js"></script>
  <script src="vendor/mv/MVRP_Dev.js"></script>
  <script src="vendor/mv/MVRP_Map.js"></script>

</body>
</html>
